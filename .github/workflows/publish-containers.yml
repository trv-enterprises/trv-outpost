name: Publish Containers

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: outpost-server
            context: .
            dockerfile: ./server-go/Dockerfile
          - image: outpost-client
            context: ./client
            dockerfile: ./client/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Resolve build metadata
        id: build_meta
        run: |
          # Strip the leading "v" from the git tag to get a clean
          # semver string (matches the docker tag convention and what
          # the Go version-stamping wants).
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          # Build number from client/build.json — the same field the
          # client side stamps so server + client report the same
          # build number out the About dialog.
          build_num="$(grep -o '"buildNumber"[^0-9]*[0-9]*' client/build.json | grep -o '[0-9]*')"
          echo "version=${version}"     >> "$GITHUB_OUTPUT"
          echo "build_num=${build_num:-unknown}" >> "$GITHUB_OUTPUT"
          echo "git_commit=${GITHUB_SHA::12}"    >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build_meta.outputs.version }}
            BUILD_NUM=${{ steps.build_meta.outputs.build_num }}
            GIT_COMMIT=${{ steps.build_meta.outputs.git_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
