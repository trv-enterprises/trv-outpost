# Docker Compose for evaluators / self-hosters who want a one-command
# deployment from the published container images. No build required —
# pulls multi-arch images straight from ghcr.io.
#
# Quickstart:
#   docker compose -f docker-compose.deploy.yml up -d
#   open http://localhost
#
# All env vars below have working defaults; no .env file is required to
# get to a running dashboard. Copy .env.example to .env if you want to
# customize anything (AI features, custom domain + HTTPS, MQTT, etc.).
#
# Defaults are tuned for "I want to see the dashboard on my laptop":
#   - DOMAIN=localhost              → Caddy serves on :80 with self-
#                                     signed cert; no DNS or LE needed
#   - IMAGE_TAG=latest              → most recent tagged release
#   - ANTHROPIC_API_KEY (unset)     → AI builder is disabled, the rest
#                                     of the app works fine
#
# For HTTPS with a real domain, see docs/DEPLOYMENT.md.

services:
  caddy:
    image: ghcr.io/trv-enterprises/outpost-client:${IMAGE_TAG:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    image: ghcr.io/trv-enterprises/outpost-server:${IMAGE_TAG:-latest}
    expose:
      - "3001"
    environment:
      - ENV=production
      - DASHBOARD_AUTH_ALLOW_LEGACY_GUID=false
      - DASHBOARD_SERVER_MODE=release
      - DASHBOARD_SERVER_HOST=0.0.0.0
      - DASHBOARD_MONGODB_URI=mongodb://mongodb:27017
      - DASHBOARD_MONGODB_DATABASE=dashboard
      # Optional: leave empty to disable the AI Builder. The rest of
      # the dashboard (charts, controls, displays, MQTT, etc.) works
      # without it.
      - DASHBOARD_LLM_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional: only set if you have an external service (e.g.
      # ts-store) that needs to dial back to this server's inbound
      # WebSocket. Leave empty for the standard quickstart.
      - DASHBOARD_HOST=${DASHBOARD_HOST:-}
      # Optional: enable Clerk-backed sign-in by setting both vars.
      # See udoc/docs/clerk-sso.md.
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
