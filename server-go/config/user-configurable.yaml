# User-Configurable Settings
# These settings can be modified by administrators through the Settings UI.
# On first run, these values are seeded into MongoDB.
# Changes made in the UI are persisted in MongoDB and take precedence over this file.

settings:
  - key: default_layout_dimension
    category: layout
    description: "Default layout dimension for new dashboards"
    value: "1728x1117-MAC"

  - key: layout_dimensions
    category: layout
    description: "Available dashboard layout dimension presets"
    # Using inline JSON format since Viper handles nested maps inconsistently
    value:
      - {name: "1728x1117-MAC", max_width: 1728, max_height: 1117}
      - {name: "1920x1080-HD", max_width: 1920, max_height: 1080}
      - {name: "2056x1329", max_width: 2056, max_height: 1329}
      - {name: "2560x1440-2K", max_width: 2560, max_height: 1440}
      - {name: "2992x1934", max_width: 3008, max_height: 1934}
      - {name: "3456x2160", max_width: 3456, max_height: 2160}
      - {name: "3840x2160-4K", max_width: 3840, max_height: 2160}

  - key: tile_font_size
    category: appearance
    description: "Font size for compact tile control labels (xs, sm, md, lg)"
    value: "sm"

  - key: default_numeric_chart_number_size
    category: appearance
    description: "Default font size (px) for the value in new Number charts"
    value: 120

  - key: default_dashboard_fit_mode
    category: dashboard
    description: "Default viewer fit mode for dashboards a user has not explicitly set. One of: actual, window, width, stretch."
    value: "stretch"

  - key: dashboard_command_topic
    category: dashboard
    description: "MQTT topic for dashboard commands (voice control, kiosk integration)"
    value: "dashboard/cmd"

  - key: dashboard_command_connection
    category: dashboard
    description: "MQTT connection ID used for dashboard commands"
    value: ""

  - key: default_browser_user_guid
    category: auth
    description: "Default user GUID for browser-mode visitors who haven't been assigned an identity yet (no ?user_id= URL, no localStorage value). Empty means \"no default\" — visitors hit a 'sign-in not configured' stub. This is identity assertion, NOT authentication: anyone hitting the bare URL becomes this user. Use only when the deployment is single-user or behind a separate access control layer."
    value: ""

  - key: dashboard_config_refresh_interval
    category: dashboard
    description: "How often (seconds) viewers re-fetch the dashboard record from the server to pick up edits made by another user. Applies to ALL dashboards in the deployment; hidden from authors to avoid per-dashboard cognitive load. Polling is paused while a user is editing the dashboard they're viewing, gated on browser-tab visibility, and only triggers a re-render when the server reports an actual change. Set to 0 to disable. Default 300 (5 min) is light enough that an unattended kiosk picks up edits within a few minutes without measurable load."
    value: 300

  - key: enabled_types
    category: availability
    description: "Types/subtypes/integrations available for creation, AI suggestions, and MCP catalog. Existing dashboard components remain functional regardless. Empty arrays are populated from the registry on first boot. Managed via Manage → Settings → Type Availability."
    value:
      integrations: []
      connections: []
      charts: []
      controls: []
      displays: []

  - key: known_types
    category: availability
    description: "Server-maintained ledger of types/subtypes/integrations the system has seen. Used to detect newly added types after upgrades so they can be enabled by default. Do not edit manually."
    value:
      integrations: []
      connections: []
      charts: []
      controls: []
      displays: []

  # Session-token policy (v0.17.0+). Changes apply to tokens issued
  # AFTER the change — already-minted tokens keep their original exp.
  # Operators can shorten TTLs to harden, or lengthen for friction-
  # sensitive deployments (kiosks). Server clamps to safe bounds.
  - key: auth.access_token_ttl_seconds
    category: auth
    description: "Lifetime in seconds of the short-lived access JWT (60-3600). Default 900 = 15 minutes. Lower hardens; higher reduces refresh round-trips."
    value: 900

  - key: auth.refresh_token_ttl_seconds
    category: auth
    description: "Lifetime in seconds of the refresh token (3600-2592000). Default 604800 = 7 days. Drives how often users must re-bootstrap when they don't keep the tab open."
    value: 604800

  # Extensions — optional Design-mode add-on features. Each extension
  # has its own boolean toggle here. When every extension is disabled,
  # the "Extensions" group in the Design sidebar hides entirely.
  - key: extensions.tsstore_alerts.enabled
    category: extensions
    description: "ts-store Alerts extension — central /design/extensions/tsstore-alerts page for managing ts-store alert rules across every tsstore connection. Disable to hide the sidebar link, redirect the route, and 403 the backing API. Chart queries against ts-store connections and inbound alert webhooks are NOT affected — this gates the rule-management page only."
    value: true

  - key: extensions.edgelake_terminal.enabled
    category: extensions
    description: "EdgeLake Terminal extension — interactive AnyLog/EdgeLake command shell at /design/extensions/edgelake-terminal. Sends raw commands to any EdgeLake connection and prints the response. Disable to hide the sidebar link, redirect the route, and 403 the backing API. Chart queries against EdgeLake connections are NOT affected — this gates the terminal page only. To disable EdgeLake support entirely, use the Type Availability setting (enabled_types)."
    value: true

  # ─── AI Assistant (dashboard-wide chat assistant) ───────────────────
  # Single master switch for ALL AI agent surfaces — the Component AI
  # agent (scoped to one chart at a time, reached via "Create/Edit with
  # AI") AND the Dashboard Assistant (the header chat sidecar). One gate
  # by design: there is no valid state where one is on and the other off.
  # On top of this, an Anthropic API key must be present at server start
  # (ASSISTANT_ANTHROPIC_API_KEY or ANTHROPIC_API_KEY) — this setting is
  # the admin soft kill-switch layered over that. When off: the
  # Create/Edit-with-AI entry points hide, the Assistant header icon does
  # not render, and the AI routes are unavailable. Restart required for a
  # change to take effect (read at boot, same posture as enabled_types).
  # Migrated from the former `assistant.enabled` key (see
  # migrations.go::migrateAssistantEnabledToAIEnabled).
  - key: ai.enabled
    category: ai
    description: "AI features master switch — governs BOTH the Component AI agent (Create/Edit with AI) and the Dashboard Assistant (header chat). Requires an Anthropic API key at server start; this is the admin soft kill-switch on top of that. Restart required for changes to take effect."
    value: true

  - key: assistant.daily_token_budget
    category: ai
    description: "Per-user daily token budget for the Dashboard Assistant. Object with `input` and `output` keys. Counted in Anthropic tokens, resets at UTC midnight. Defaults to 1M input / 250k output — generous for most workflows; lower if costs run away, raise for power users. A user past either cap is refused new turns until the next UTC day; their conversation is not lost."
    value:
      input: 1000000
      output: 250000

  - key: assistant.model
    category: ai
    description: "Anthropic model the Dashboard Assistant runs. Use the alias `sonnet` (latest Sonnet — fast + cheaper, the default and a solid all-round choice) or `opus` (latest Opus — strongest reasoning + layout/design quality, higher cost; recommended for building polished multi-panel dashboards). Aliases auto-track the newest model each release. To pin a specific snapshot (e.g. for A/B comparison), enter a full model ID like `claude-sonnet-4-20250514` instead of an alias. Takes effect on next server restart. Per-deployment choice; not per-user."
    value: "sonnet"
