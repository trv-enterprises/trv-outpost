            $ref: '#/definitions/handlers.EdgeLakeTerminalExecuteResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Extension disabled
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Connection not found
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: EdgeLake node returned an error
          schema:
            additionalProperties:
              type: string
            type: object
        "504":
          description: Per-call timeout exceeded
          schema:
            additionalProperties:
              type: string
            type: object
