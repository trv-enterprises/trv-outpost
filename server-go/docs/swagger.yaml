  models.DashboardPanel:
    description: Panel position and size in the grid with optional component reference
      or text config
    properties:
      component_id:
        description: Reference to a component (chart, control, or display)
        type: string
      h:
        type: integer
      id:
        type: string
      pin_connection:
        description: |-
          PinConnection opts this panel OUT of dashboard-variable connection-swap.
          When a connection_swap variable is active, every panel follows the
          selected connection by default; a pinned panel keeps its component's own
          connection. Per-panel (not per-component) so the same component can
          follow on one dashboard and be pinned on another.
        type: boolean
      text_config:
        allOf:
        - $ref: '#/definitions/models.PanelTextConfig'
        description: Native text panel config
      w:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  models.DashboardSettings:
    description: Dashboard settings and preferences
    properties:
      allow_export:
        type: boolean
      default_view:
        type: string
      is_public:
        type: boolean
      layout_dimension:
        type: string
      refresh_interval:
        type: integer
      scale_percent:
        description: |-
          ScalePercent is the "everything bigger" zoom. LayoutDimension is the
          render TARGET; the dashboard is BUILT on a derived DESIGN canvas of
          target/(scale/100), so at render the viewer's transform:scale blows
          it back up to target — uniformly enlarging fonts, lines, and layout
          while preserving proportions. 100 = build at target (no enlargement);
          120 = build on target/1.2 so everything renders 20% bigger. Default
          100. Empty/0 is treated as 100 by readers.
        type: integer
      theme:
        type: string
      timezone:
        type: string
      title_scale:
        description: Title font scale % (default 100, range 50-200)
        type: integer
      variables:
        description: |-
          Variables holds the dashboard-variable definitions. v1 implements a single
          connection-swap variable (index 0); the array shape is forward-compatible
          with multiple/filter-value variables.
        items:
          $ref: '#/definitions/models.DashboardVariable'
        type: array
      variables_enabled:
        description: |-
          VariablesEnabled is the per-dashboard on/off gate for the dashboard-variable
          feature (the header dropdown that re-scopes panels). When false the viewer
          ignores Variables entirely and behaves as if the feature did not exist.
        type: boolean
    type: object
