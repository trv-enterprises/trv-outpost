    description: Request body for updating an existing device
    properties:
      connection_id:
        type: string
      device_type_id:
        type: string
      enabled:
        type: boolean
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      room:
        type: string
      state_topic:
        type: string
      tags:
        items:
          type: string
        type: array
      target:
        type: string
    type: object
  models.UpdateDeviceTypeRequest:
    description: Request body for updating an existing device type
    properties:
      capabilities:
        items:
          $ref: '#/definitions/models.DeviceCapability'
        type: array
      category:
        type: string
      commands:
        additionalProperties:
          $ref: '#/definitions/models.CommandDef'
        type: object
      description:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      protocol:
        type: string
      response:
        $ref: '#/definitions/models.ResponseDef'
      state_query:
        $ref: '#/definitions/models.StateQueryDef'
      subtype:
        type: string
      supported_types:
        items:
          type: string
        type: array
    type: object
  models.UpdateNamespaceRequest:
    description: Request body for updating an existing namespace
    properties:
      color:
        type: string
      description:
        type: string
      name:
        type: string
    type: object
  models.UpdateSettingRequest:
    properties:
      value: {}
    required:
    - value
    type: object
  models.UpdateSnippetRequest:
    properties:
      command:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    required:
    - command
    - title
    type: object
  models.UpdateUserRequest:
    description: Request body for updating an existing user
    properties:
      active:
        type: boolean
      capabilities:
        items:
          $ref: '#/definitions/models.Capability'
        type: array
      clerk_user_id:
        description: |-
          ClerkUserID lets an admin manually link or re-link a user to a
          Clerk identity. Send "" to clear the link. Most deployments
          won't need this — first sign-in JIT-links automatically — but
          it's available for cases where the email in Clerk has drifted
          from what's stored on the User record.
        type: string
      email:
        type: string
      name:
        type: string
    type: object
  models.User:
    description: User account with authentication and capabilities
    properties:
      active:
        description: Whether user is active
        type: boolean
      assistant_budget_override:
        allOf:
        - $ref: '#/definitions/models.AssistantBudgetOverride'
        description: |-
          AssistantBudgetOverride raises (or lowers) this user's daily
          Dashboard Assistant token caps relative to the global
          assistant.daily_token_budget. Nil = no override (use global caps).
          Set by an admin from the AI API Usage page. See the type for scope
          semantics.
      capabilities:
        description: User capabilities
        items:
          $ref: '#/definitions/models.Capability'
        type: array
      clerk_user_id:
        description: |-
          ClerkUserID links this dashboard user to a Clerk identity. Set on
          first sign-in via JIT-link from email match, or by an admin from
          the Users page. Subsequent sign-ins resolve via this field
          directly so an email change in Clerk doesn't break the link.
          Empty when the deployment isn't using Clerk or the user hasn't
          signed in via Clerk yet.
        type: string
      created:
        type: string
      email:
        description: Optional email
        type: string
      guid:
        description: UUID for authentication header
        type: string
      id:
        type: string
      kind:
        allOf:
        - $ref: '#/definitions/models.UserKind'
        description: |-
          Kind discriminates humans from system principals. Defaults to
          "human" on every existing record (the migration sets it when
          the field is missing). Anything other than "human" is treated
          as a system user — no interactive sign-in path, IdP/Clerk
          rejects, exists only for API-key issuance.
      name:
        description: Display name
        type: string
      updated:
        type: string
    type: object
  models.UserCapabilitiesResponse:
    description: Current user's identity, capabilities, and access permissions
    properties:
      active:
        type: boolean
      can_control:
        description: |-
          CanControl mirrors HasControlAccess(); separate from CanDesign /
          CanManage because control is its own axis and not implied by
          either elevation.
        type: boolean
      can_design:
        type: boolean
      can_manage:
        type: boolean
      capabilities:
        items:
          $ref: '#/definitions/models.Capability'
        type: array
      guid:
        description: Auth-header GUID; what the SPA persists
        type: string
      name:
        type: string
      user_id:
        description: Mongo _id of the user record
        type: string
    type: object
  models.UserConfigResponse:
    properties:
      settings:
        additionalProperties: true
        type: object
      user_id:
        type: string
    type: object
  models.UserKind:
    enum:
    - human
    - system
    type: string
    x-enum-varnames:
    - UserKindHuman
    - UserKindSystem
  models.UserListResponse:
    description: Response containing a list of users with pagination
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      users:
        items:
          $ref: '#/definitions/models.User'
        type: array
    type: object
  models.VariableCandidate:
    properties:
      compatible:
        description: passes the variable's SchemaStrict check
        type: boolean
      id:
        type: string
      name:
        type: string
      namespace:
        type: string
      reason:
        description: why incompatible (empty when compatible)
        type: string
      reference:
        description: the connection the panels currently use (the baseline)
        type: boolean
      tags:
        description: |-
          Tags is the connection's tag set, carried so the client can derive a
          dropdown label from a prefixed tag (see ConnectionSwapConfig.LabelTagPrefix).
        items:
          type: string
        type: array
      type_id:
        type: string
    type: object
  models.VariableCandidatesResponse:
    properties:
      candidates:
        items:
          $ref: '#/definitions/models.VariableCandidate'
        type: array
      variable:
        type: string
    type: object
  models.VariableValuesResponse:
    properties:
      count:
        type: integer
      error:
        type: string
      partial:
        description: |-
          Partial is true when a streaming capture was cut short (timeout / client
          stop / cap) and the list may be incomplete.
        type: boolean
      success:
        type: boolean
      values:
        items:
          type: string
        type: array
    type: object
  registry.Capabilities:
    properties:
      can_read:
        description: All adapters support reading
        type: boolean
      can_stream:
        description: Real-time subscription support
        type: boolean
      can_write:
        description: Bidirectional adapters only
        type: boolean
    type: object
  registry.Catalog:
    properties:
      chart_types:
        items:
          $ref: '#/definitions/registry.ComponentTypeInfo'
        type: array
      connection_types:
        items:
          $ref: '#/definitions/registry.TypeInfo'
        type: array
      control_types:
        items:
          $ref: '#/definitions/registry.ComponentTypeInfo'
        type: array
      device_types:
        items:
          $ref: '#/definitions/registry.DeviceTypeSummary'
        type: array
      display_types:
        items:
          $ref: '#/definitions/registry.ComponentTypeInfo'
        type: array
      integrations:
        items:
          $ref: '#/definitions/registry.IntegrationInfo'
        type: array
      layout_dimensions:
        items:
          $ref: '#/definitions/registry.LayoutDimensionSummary'
        type: array
    type: object
  registry.ComponentCapabilities:
    properties:
      can_read:
        description: Subscribes to live state
        type: boolean
      can_write:
        description: Sends commands
        type: boolean
      requires_connection:
        description: Must be bound to a connection (false for e.g. text labels)
        type: boolean
      requires_device_type:
        description: Needs a device_type_id to translate commands
        type: boolean
      supports_streaming:
        description: Consumes streaming data (as opposed to polling)
        type: boolean
    type: object
  registry.ComponentTypeInfo:
    properties:
      capabilities:
        $ref: '#/definitions/registry.ComponentCapabilities'
      category:
        description: CategoryChart | CategoryControl | CategoryDisplay
        type: string
      config_schema:
        description: Fields the component exposes in the editor
        items:
          $ref: '#/definitions/registry.ConfigField'
        type: array
      data_requirements:
        allOf:
        - $ref: '#/definitions/registry.DataRequirements'
        description: Charts only
      default_config:
        additionalProperties: true
        description: Seed values for a freshly-created instance
        type: object
      description:
        description: One-line description for selection UIs and AI prompts
        type: string
      display_name:
        description: Human-readable label
        type: string
      hidden:
        description: True for legacy aliases and backward-compat types kept so old
          records still edit
        type: boolean
      icon:
        description: MDI icon name (e.g. "mdiGestureTap"); frontend resolves to an
          SVG path
        type: string
      integration:
        description: 'Optional: groups types under a named integration (e.g., "frigate",
          "casita")'
        type: string
      subtype:
        description: '"bar", "toggle", "frigate" — the value stored in chart_type
          / control_type / display_type'
        type: string
      type_id:
        description: '"chart.bar", "control.toggle", "display.frigate"'
        type: string
      ui_category:
        description: 'Grouping for widget picker: "carbon", "custom", "tile", "decorative"'
        type: string
    type: object
  registry.ConfigField:
    properties:
      default: {}
      description:
        type: string
      name:
        type: string
      options:
        description: For select type
        items:
          type: string
        type: array
      required:
        type: boolean
      type:
        description: string, int, bool, password, select
        type: string
    type: object
  registry.DataRequirements:
    properties:
      has_axis_labels:
        type: boolean
      has_reference_levels:
        description: 'Banded-bar style: show the reference-levels editor (value +
          label + kind rows)'
        type: boolean
      has_series_column:
        type: boolean
      has_sort_limit:
        type: boolean
      has_time_bucket:
        type: boolean
      has_visible_columns:
        type: boolean
      has_x_axis_format:
        type: boolean
      multiple_y_axis:
        type: boolean
      requires_x_axis:
        type: boolean
      requires_y_axis:
        type: boolean
      x_axis_label:
        description: 'UI label hint: "X-Axis (Categories)", "Category Column", etc.'
        type: string
      y_axis_label:
        type: string
    type: object
  registry.DeviceTypeSummary:
    properties:
      category:
        type: string
      description:
        type: string
      id:
        type: string
      is_built_in:
        type: boolean
      name:
        type: string
      protocol:
        type: string
      supported_types:
        items:
          type: string
        type: array
    type: object
  registry.IntegrationInfo:
    properties:
      description:
        description: One-line description for the settings UI
        type: string
      display_name:
        description: Human-readable label
        type: string
      id:
        description: Stable identifier (e.g., "frigate", "casita")
        type: string
      owned_chart_types:
        description: Subtype IDs of charts owned by this integration
        items:
          type: string
        type: array
      owned_connection_type:
        description: 'Optional: connection type ID this integration adds beyond the
          standard adapter registry (e.g., "frigate")'
        type: string
      owned_control_types:
        description: Subtype IDs of controls owned by this integration
        items:
          type: string
        type: array
      owned_display_types:
        description: Subtype IDs of displays owned by this integration
        items:
          type: string
        type: array
    type: object
  registry.LayoutDimensionSummary:
    properties:
      cols:
        description: |-
          Cols/Rows are the cell budget AT this dimension's DefaultScale —
          i.e. the grid an agent should plan to when building at this
          dimension's normal scale. (Higher scale → smaller budget, since the
          design canvas = dimension / scale.)
        type: integer
      default_scale:
        description: '% (0/absent → 100)'
        type: integer
      is_default:
        type: boolean
      max_height:
        type: integer
      max_width:
        type: integer
      name:
        type: string
      rows:
        type: integer
    type: object
  registry.TypeInfo:
    properties:
      capabilities:
        $ref: '#/definitions/registry.Capabilities'
      category:
        description: e.g., "db", "stream", "api", "file", "store"
        type: string
      config_schema:
        items:
          $ref: '#/definitions/registry.ConfigField'
        type: array
      display_name:
        type: string
      integration:
        description: 'Optional: groups types under a named integration (e.g., "frigate",
          "casita")'
        type: string
      type_id:
        type: string
    type: object
  service.CreateAlertRequest:
    properties:
      condition:
        type: string
      connection_id:
        description: TSStore connection (rule owner)
        type: string
      cooldown:
        description: '"5m" etc., ts-store duration'
        type: string
      dashboard_id:
        description: optional bell deep-link target
        type: string
      max_replay:
        description: e.g. "1h"; only valid when restart_policy=="resume"
        type: string
      mqtt_qos:
        description: 0/1/2; nil = ts-store default (1)
        type: integer
      mqtt_topic:
        type: string
      poll_interval:
        type: string
      restart_policy:
        description: '"now" (default) or "resume"'
        type: string
      rule_name:
        type: string
      sink_connection_id:
        description: |-
          MQTT-sink fields (type=mqtt):
          SinkConnectionID is an MQTT-type connection record from which
          broker_url + username + password are harvested. Topic + QoS
          come from the rule directly (ts-store models topic as a
          per-rule field; an MQTT connection record is just the broker).
        type: string
      timeout:
        description: |-
          Webhook-sink fields (type=webhook):
          Timeout applies only to the webhook block. Optional override is
          for callers who want to deliver to an external URL instead of
          the dashboard's bell receiver (no secret minted in that case).
        type: string
      type:
        description: '"webhook" | "mqtt"'
        type: string
      webhook_headers:
        additionalProperties:
          type: string
        type: object
      webhook_url_override:
        type: string
    required:
    - condition
    - connection_id
    - rule_name
    - type
    type: object
  service.CreateAlertResponse:
    properties:
      alert_id:
        type: string
      secret_id:
        type: string
      webhook_url:
        type: string
    type: object
  service.ProbeConnectionResult:
    properties:
      error:
        type: string
      http_status:
        type: integer
      ok:
        type: boolean
    type: object
  service.TSStoreAggregatedRule:
    properties:
      alert_id:
        type: string
      alert_target:
        type: string
      alert_type:
        description: webhook | ws | mqtt
        type: string
      alerts_fired:
        type: integer
      condition:
        type: string
      connection_count:
        type: integer
      connection_id:
        description: |-
          Identity within ts-store. ts-store owns IDs at the alert level
          (one alert = one transport target = one rule list); rule names
          are unique within a single alert.

          ConnectionID / ConnectionName identify the *primary* dashboard
          connection that points at this backend — preserved for delete
          (the DELETE handler needs a connection record to dial through)
          and back-compat. The full set of dashboard connections that
          resolve to the same backend is in Connections; the count is
          duplicated to ConnectionCount for table sort/filter ergonomics.
        type: string
      connection_name:
        type: string
      connections:
        items:
          $ref: '#/definitions/service.TSStoreConnectionRef'
        type: array
      cooldown:
        type: string
      dashboard_id:
        description: |-
          DashboardID is decoded opportunistically from ExternalRef when
          it parses as `{"dashboard_id":"<uuid>"}`. Empty otherwise —
          rules created by non-dashboard tooling carry whatever the
          producer chose to put in external_ref.
        type: string
      external_ref:
        type: string
      namespace:
        type: string
      rule_name:
        description: Rule-level fields straight from ts-store.
        type: string
      state:
        description: |-
          Operational status. ts-store reports state + alerts_fired at
          the alert level (not per rule); we mirror onto every rule row
          for table readability. Last-fired-per-rule is not yet exposed
          by ts-store; left empty until it lands.
        type: string
      store_name:
        type: string
    type: object
  service.TSStoreAggregatedRulesResponse:
    properties:
      errors:
        items:
          $ref: '#/definitions/service.TSStoreFetchError'
        type: array
      rules:
        items:
          $ref: '#/definitions/service.TSStoreAggregatedRule'
        type: array
    type: object
  service.TSStoreConnectionRef:
    properties:
      connection_id:
        type: string
      connection_name:
        type: string
      namespace:
        type: string
    type: object
  service.TSStoreFetchError:
    properties:
      connection_id:
        type: string
      connection_name:
        type: string
      error:
        type: string
    type: object
  streaming.StreamStatus:
    properties:
      bufferCount:
        type: integer
      connected:
        type: boolean
      connectionID:
        type: string
      lastError: {}
      subscriberCount:
        type: integer
    type: object
host: localhost:3001
info:
  contact:
    email: support@example.com
    name: Dashboard Team
  description: Dashboard system with AI-powered chart generation
  title: TRVE Dashboards API
  version: "1.0"
paths:
  /ai/sessions:
    post:
      consumes:
      - application/json
      description: Create a new AI session for chart creation or editing. Creates
        a chart draft.
      parameters:
      - description: Session creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateAISessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AISessionResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new AI session
      tags:
      - ai
  /ai/sessions/{id}:
    delete:
      description: Cancel the AI session and discard the draft
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Cancel AI session
      tags:
      - ai
    get:
      description: Get an AI session by ID with current chart state
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AISessionResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get AI session
      tags:
      - ai
  /ai/sessions/{id}/messages:
    post:
      consumes:
      - application/json
      description: Send a user message to an AI session. The AI agent will process
        the message asynchronously.
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Message content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SendMessageRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Message accepted for processing
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Send message to AI session
      tags:
      - ai
  /ai/sessions/{id}/save:
    post:
      consumes:
      - application/json
      description: Save the AI session by publishing the draft as a new final version
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Chart name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.SaveSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Component'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Save AI session (publish draft)
      tags:
      - ai
  /ai/sessions/{id}/ws:
    get:
      description: Subscribe to real-time updates for an AI session via WebSocket
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Subscribe to AI session events via WebSocket
      tags:
      - ai
  /alerts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AlertListResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List visible alerts
      tags:
      - Alerts
  /alerts/{id}/pin:
    delete:
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Unpin an alert
      tags:
      - Alerts
    post:
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Pin an alert (keep visible)
      tags:
      - Alerts
  /alerts/{id}/seen:
    post:
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Mark an alert seen (dismiss)
      tags:
      - Alerts
  /api/ai/availability:
    get:
      description: Returns per-surface availability flags. `enabled` is a legacy alias
        for `component_agent_enabled`. Both AI surfaces require the unified `ai.enabled`
        admin setting AND an Anthropic key at server start; they share that single
        gate.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AIAvailabilityResponse'
      summary: AI availability
      tags:
      - ai
  /api/ai/debug:
    get:
      description: Stream real-time debug events from the AI agent including LLM requests,
        responses, and tool calls
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
      summary: Connect to AI debug WebSocket
      tags:
      - debug
  /api/ai/debug/status:
    get:
      description: Get the current status of the AI debug system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get debug status
      tags:
      - debug
  /api/ai/usage:
    get:
      description: 'Per-user Assistant token usage: today vs effective cap + a 30-day
        history. Only the Dashboard Assistant is metered.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AIUsageResponse'
