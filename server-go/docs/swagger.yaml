basePath: /api
definitions:
  handlers.AIAvailabilityResponse:
    description: Per-surface AI availability flags for the SPA bootstrap.
    properties:
      chat_agent_enabled:
        type: boolean
      component_agent_enabled:
        type: boolean
      enabled:
        type: boolean
    type: object
  handlers.AIUsageResponse:
    properties:
      global_input_cap:
        type: integer
      global_output_cap:
        type: integer
      history_days:
        type: integer
      metered_note:
        description: |-
          MeteredNote spells out that only the Assistant is counted, so the
          frontend can surface it verbatim without hardcoding the caveat.
        type: string
      users:
        items:
          $ref: '#/definitions/handlers.userUsage'
        type: array
    type: object
  handlers.CategoryInfo:
    properties:
      display_name:
        type: string
      name:
        type: string
      type_count:
        type: integer
    type: object
  handlers.ConnectionTypeGuidanceResponse:
    properties:
      guidance:
        type: string
      has_entry:
        type: boolean
      type_id:
        type: string
    type: object
  handlers.CreateSystemUserRequest:
    properties:
      capabilities:
        items:
          $ref: '#/definitions/models.Capability'
        type: array
      name:
        type: string
    required:
    - name
    type: object
  handlers.EdgeLakeTerminalExecuteRequest:
    properties:
      command:
        type: string
      connection_id:
        type: string
      destination:
        type: string
      method:
        type: string
      timeout_seconds:
        type: integer
    required:
    - command
    - connection_id
    type: object
  handlers.EdgeLakeTerminalExecuteResponse:
    properties:
      command:
        type: string
      destination:
        type: string
      duration_ms:
        type: integer
      method:
        type: string
      response:
        type: string
    type: object
  handlers.ExecuteCommandRequest:
    properties:
      action:
        type: string
      payload:
        additionalProperties: true
        type: object
      target:
        type: string
    required:
    - action
    type: object
  handlers.ExecuteCommandResponse:
    properties:
      data:
        additionalProperties: true
        type: object
      message:
        type: string
      success:
        type: boolean
      timestamp:
        type: string
    type: object
  handlers.ExecuteControlRequest:
    properties:
      value:
        description: The value from the control (bool, number, string, or null for
          buttons)
    type: object
  handlers.ListCategoriesResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/handlers.CategoryInfo'
        type: array
    type: object
  handlers.ListComponentTypesResponse:
    properties:
      count:
        type: integer
      types:
        items:
          $ref: '#/definitions/registry.ComponentTypeInfo'
        type: array
    type: object
  handlers.ListConnectionTypesResponse:
    properties:
      categories:
        items:
          type: string
        type: array
      count:
        type: integer
      types:
        items:
          $ref: '#/definitions/registry.TypeInfo'
        type: array
    type: object
  handlers.ListIntegrationsResponse:
    properties:
      count:
        type: integer
      integrations:
        items:
          $ref: '#/definitions/registry.IntegrationInfo'
        type: array
    type: object
  handlers.SaveSessionRequest:
    properties:
      name:
        type: string
    type: object
  handlers.SessionResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      user:
        $ref: '#/definitions/models.UserCapabilitiesResponse'
    type: object
  handlers.StreamAggregatedRequest:
    properties:
      function:
        description: avg, min, max, sum, count
        type: string
      interval:
        description: Bucket interval in seconds
        type: integer
      series_col:
        description: Column to partition by (e.g., "location") - optional
        type: string
      timestamp_col:
        description: Timestamp column
        type: string
      value_cols:
        description: Columns to aggregate
        items:
          type: string
        type: array
    required:
    - function
    - interval
    - timestamp_col
    - value_cols
    type: object
  handlers.tsstoreAlertPayload:
    properties:
      condition:
        type: string
      data:
        additionalProperties: true
        type: object
      external_ref:
        type: string
      rule_name:
        type: string
      store_name:
        type: string
      timestamp:
        description: nanoseconds since unix epoch
        type: integer
    type: object
  handlers.usageDay:
    properties:
      date_utc:
        type: string
      input_tokens:
        type: integer
      output_tokens:
        type: integer
    type: object
  handlers.userUsage:
    properties:
      effective_input_cap:
        type: integer
      effective_output_cap:
        type: integer
      global_input_cap:
        type: integer
      global_output_cap:
        type: integer
      guid:
        type: string
      history:
        items:
          $ref: '#/definitions/handlers.usageDay'
        type: array
      name:
        type: string
      override:
        $ref: '#/definitions/models.AssistantBudgetOverride'
      today_input:
        type: integer
      today_output:
        type: integer
    type: object
  mcp.JSONRPCError:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  mcp.JSONRPCRequest:
    properties:
      id: {}
      jsonrpc:
        type: string
      method:
        type: string
      params:
        additionalProperties: true
        type: object
    type: object
  mcp.JSONRPCResponse:
    properties:
      error:
        $ref: '#/definitions/mcp.JSONRPCError'
      id: {}
      jsonrpc:
        type: string
      result: {}
    type: object
  models.AIMessage:
    description: A message in the AI conversation
    properties:
      content:
        type: string
      id:
        type: string
      role:
        description: '"user" | "assistant" | "system"'
        type: string
      timestamp:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/models.ToolCall'
        type: array
    type: object
  models.AISession:
    description: AI session for component editing (kind=component) or general chat
      (kind=chat)
    properties:
      chart_version:
        description: Version being edited (component sessions only)
        type: integer
      component_id:
        description: Component UUID being edited (component sessions only)
        type: string
      created:
        type: string
      dashboard_id:
        description: Auto-attach to this dashboard on save (component sessions only)
        type: string
      expires_at:
        type: string
      id:
        description: UUID
        type: string
      kind:
        description: '"component" (default) | "chat"'
        type: string
      messages:
        description: Conversation history
        items:
          $ref: '#/definitions/models.AIMessage'
        type: array
      panel_id:
        description: Auto-attach to this panel on save (component sessions only)
        type: string
      status:
        description: '"active" | "completed" | "cancelled"'
        type: string
      updated:
        type: string
    type: object
  models.AISessionResponse:
    description: Response containing AI session state
    properties:
      component:
        allOf:
        - $ref: '#/definitions/models.Component'
        description: Current component state (draft)
      session:
        $ref: '#/definitions/models.AISession'
    type: object
  models.APIConfig:
    properties:
      auth_credentials:
        additionalProperties:
          type: string
        type: object
      auth_type:
        description: none, bearer, basic, api-key
        type: string
      body:
        description: Request body template
        type: string
      headers:
        additionalProperties:
          type: string
        description: Request headers
        type: object
      insecure_skip_verify:
        description: |-
          InsecureSkipVerify disables TLS certificate verification for
          this connection. The adapter only honors this when the server
          deployment also has `api.allow_insecure_tls: true` — both gates
          must agree before verification is actually skipped. Intended
          for development / homelab sources with self-signed certs
          (Proxmox UI, internal management appliances). Never set on a
          public-internet endpoint; MITM goes undetected when on.
        type: boolean
      method:
        description: HTTP method (GET, POST, etc.)
        type: string
      query_params:
        additionalProperties:
          type: string
        description: Query parameters
        type: object
      response_config:
        allOf:
        - $ref: '#/definitions/models.APIResponseConfig'
        description: Response parsing config
      retry_count:
        type: integer
      retry_delay:
        description: milliseconds
        type: integer
      timeout:
        description: seconds
        type: integer
      url:
        description: Full API endpoint URL
        type: string
    required:
    - url
    type: object
  models.APIKey:
    properties:
      created:
        type: string
      expires_at:
        type: string
      id:
        description: UUID
        type: string
      last_used:
        type: string
      name:
        description: Human label
        type: string
      prefix:
        description: First 8 chars of the random token, plaintext
        type: string
      revoked:
        type: boolean
      revoked_at:
        type: string
      user_guid:
        description: Owner
        type: string
    type: object
  models.APIResponseConfig:
    properties:
      data_path:
        description: |-
          DataPath is the JSON path to the array of records (e.g., "data", "results", "items")
          If empty, assumes response is already an array or will be parsed as key-value pairs
        type: string
    type: object
  models.Alert:
    properties:
      connection_id:
        type: string
      dashboard_id:
        description: |-
          DashboardID is the decoded `{"dashboard_id":"…"}` from
          ExternalRef, populated at ingest time when the producer
          followed that convention. Surfaces as the bell-row "Open
          dashboard" link target. Empty when the producer didn't set
          external_ref, or set it to something that wasn't a
          dashboard_id-shaped JSON object — the bell row just hides the
          link button in that case.
        type: string
      expires_at:
        description: |-
          ExpiresAt drives the MongoDB TTL index. Defaults to 30 days
          past ReceivedAt; once a per-deployment retention setting lands
          this becomes computed from that. Pinned alerts are still
          subject to TTL — pinning is "stay visible until cleared," not
          "keep forever."
        type: string
      external_ref:
        description: |-
          ExternalRef is the verbatim pass-through string the producer
          (ts-store) attaches to its rule. We do not parse it on the
          server beyond an opportunistic JSON-decode into DashboardID
          for the deep-link case — anything we don't understand is left
          alone so future producers can stash arbitrary structured data
          there without requiring a server change.
        type: string
      fired_at:
        description: when the upstream rule evaluated
        type: string
      id:
        type: string
      namespace:
        description: namespace of the originating connection; reserved for future
          per-user namespace gating
        type: string
      payload:
        additionalProperties: true
        description: raw upstream payload — opaque to today's UI, surfaced when an
          expand affordance lands
        type: object
      pinned:
        description: |-
          Pinned keeps an alert visible regardless of Seen. Toggled via
          POST /api/alerts/:id/pin / DELETE /api/alerts/:id/pin. A user
          pins an alert when they want another user to see it; an
          unpin from anyone returns the alert to normal seen-tracking.
        type: boolean
      pinned_at:
        type: string
      pinned_by:
        type: string
      received_at:
        description: when the dashboard ingested it
        type: string
      rule_name:
        type: string
      seen:
        description: |-
          Seen is the global "first reader clears it" flag. Flipped to
          true by POST /api/alerts/:id/seen; flipped back to false when
          the alert is pinned (so a pin acts like an "unread" reset).
        type: boolean
      seen_at:
        type: string
      seen_by:
        description: |-
          SeenBy / PinnedBy track who last performed each action — for
          audit only. The list semantics are intentionally simple
          (single user GUID, last writer wins) so we don't drift back
          toward a per-user-seen model.
        type: string
      severity:
        description: '"info" | "warning" | "error"'
        type: string
      source:
        description: free-form integration name (ts-store store name, etc.)
        type: string
      subtitle:
        type: string
      title:
        description: bell-panel headline
        type: string
    type: object
  models.AlertListResponse:
    properties:
      alerts:
        items:
          $ref: '#/definitions/models.Alert'
        type: array
      total:
        type: integer
      visible:
        type: integer
    type: object
  models.AssistantBudgetOverride:
    properties:
      effective_date:
        description: UTC YYYY-MM-DD; required when Scope=="today"
        type: string
      input:
        description: daily input-token cap; 0 = use global
        type: integer
      output:
        description: daily output-token cap; 0 = use global
        type: integer
      scope:
        description: '"today" | "ongoing"'
        type: string
      set_by:
        description: admin GUID who set it (audit)
        type: string
    type: object
  models.BandColumns:
    properties:
      lower_control:
        type: string
      lower_limit:
        type: string
      max:
        type: string
      mean:
        description: sd / minmaxmean center
        type: string
      min:
        description: minmaxmean bounds
        type: string
      minus_1sd:
        description: -1 SD bound
        type: string
      minus_2sd:
        description: -2 SD bound
        type: string
      plus_1sd:
        description: sd bounds
        type: string
      plus_2sd:
        description: +2 SD bound
        type: string
      scheme:
        description: '"sd" (default) | "minmaxmean" | "spc"'
        type: string
      target:
        description: spc center + bounds
        type: string
      upper_control:
        type: string
      upper_limit:
        type: string
    type: object
  models.CSVConfig:
    properties:
      columns:
        description: explicit column names
        items:
          type: string
        type: array
      delimiter:
        description: 'default: ","'
        type: string
      encoding:
        description: utf-8, ascii, etc.
        type: string
      has_header:
        description: 'default: true'
        type: boolean
      path:
        type: string
      watch_changes:
        type: boolean
    required:
    - path
    type: object
  models.Capability:
    enum:
    - view
    - design
    - manage
    - webhook
    - control
    type: string
    x-enum-varnames:
    - CapabilityView
    - CapabilityDesign
    - CapabilityManage
    - CapabilityWebhook
    - CapabilityControl
  models.ChartDataMapping:
    description: Mapping configuration from data columns to chart axes/series
    properties:
      aggregation:
        allOf:
        - $ref: '#/definitions/models.DataAggregation'
        description: Aggregation to apply (first, last, avg, etc.)
      band_columns:
        allOf:
        - $ref: '#/definitions/models.BandColumns'
        description: Banded-bar column mapping. Each row in the data is expected to
          carry a Mean column plus paired ±1 SD / ±2 SD columns; the renderer reads
          each row's own values to draw a per-row envelope. The chart is per-row only
          — there is no scalar/fixed-band convention.
      column_aliases:
        additionalProperties:
          type: string
        description: Display names for columns (column name -> display name), primarily
          for dataview
        type: object
      column_widths:
        additionalProperties:
          type: integer
        description: 'For dataview only: column name -> pixel width. Default if a
          per-user override isn''t set in app_config.dataview_layouts.'
        type: object
      filters:
        description: Client-side filters applied after data fetch
        items:
          $ref: '#/definitions/models.DataFilter'
        type: array
      group_by:
        description: Column to group/split series by (client-side grouping)
        type: string
      label_col:
        description: Column for labels
        type: string
      limit:
        description: Max rows to return
        type: integer
      parser:
        allOf:
        - $ref: '#/definitions/models.StreamParserConfig'
        description: Per-component data extraction for streaming (MQTT, ts-store MQTT)
      reference_levels:
        description: |-
          ReferenceLevels was the original scalar (Westgard) reference-marker
          list. Banded-bar moved to a per-row-only convention (BandColumns
          above) so this field is read-only/legacy: existing components keep
          it for backward compat reads but the editor + AI tools no longer
          write it. Safe to remove once all stored components migrate.
        items:
          $ref: '#/definitions/models.ReferenceLevel'
        type: array
      series:
        description: Column that identifies each series (e.g., "location") - used
          for time bucket partitioning
        type: string
      sliding_window:
        allOf:
        - $ref: '#/definitions/models.SlidingWindow'
        description: Time-based sliding window (e.g., last 5 minutes)
      sort_by:
        description: Column to sort by
        type: string
      sort_order:
        description: asc or desc
        type: string
      time_bucket:
        allOf:
        - $ref: '#/definitions/models.TimeBucket'
        description: Time-bucketed aggregation for streaming data
      visible_columns:
        description: 'For dataview only: columns to render as table columns. Empty/missing
          = show all (default). Preserves the order given.'
        items:
          type: string
        type: array
      x_axis:
        description: Column for X axis (categories)
        type: string
      x_axis_format:
        description: 'Format for X axis values: chart, chart_time, chart_date, chart_datetime,
          short, long, etc.'
        type: string
      x_axis_label:
        description: Label for X axis (e.g., "Time", "Date"). Empty = render no x-axis
          name; most charts are time-based and don't need one.
        type: string
      y_axis:
        description: Columns for Y axis (values/series)
        items:
          type: string
        type: array
      y_axis_label:
        description: Legacy single y-axis label — kept for backwards compat. Prefer
          YAxisLabels (plural) going forward; this is populated from YAxisLabels[0]
          on save.
        type: string
      y_axis_labels:
        description: Per-column y-axis labels. When shorter than YAxis, missing entries
          fall back to the column name. Dual-axis charts use [0] for the left axis
          and [1] for the right. Three+ y-columns suppress axis names entirely (series
          legend carries the identity).
        items:
          type: string
        type: array
    type: object
  models.ChartQueryConfig:
    description: Query configuration for fetching chart data
    properties:
      params:
        additionalProperties: true
        description: Query parameters
        type: object
      raw:
        description: SQL query, filter, or API path
        type: string
      type:
        description: sql, csv_filter, stream_filter, api
        type: string
    type: object
  models.ColumnInfo:
    properties:
      default:
        description: Default value if any
        type: string
      name:
        description: Column name
        type: string
      nullable:
        description: Whether column allows NULL
        type: boolean
      primary_key:
        description: Whether column is part of primary key
        type: boolean
      type:
        description: Data type (e.g., "varchar", "integer")
        type: string
    type: object
  models.CommandConfig:
    description: Configuration for sending commands via a connection
    properties:
      action:
        description: Command action name
        type: string
      payload_template:
        additionalProperties: true
        description: Template with {{value}} placeholder
        type: object
      target:
        description: Optional target identifier
        type: string
    type: object
  models.CommandDef:
    description: Template for formatting control commands
    properties:
      template:
        additionalProperties: true
        description: Message template with {{value}}, {{target}} placeholders
        type: object
      value_map:
        additionalProperties: true
        description: Optional value mapping (e.g., true -> "ON", false -> "OFF")
        type: object
    type: object
  models.Component:
    description: Component (chart, control, or display) with optional data source
      binding, query config, and visualization settings
    properties:
      ai_session_id:
        description: Active AI session (drafts only)
        type: string
      chart_type:
        description: bar, line, pie, gauge, etc. (charts only)
        type: string
      component_code:
        description: React component code
        type: string
      component_type:
        description: '"chart" | "control" | "display"'
        type: string
      connection_id:
        description: Reference to connection
        type: string
      control_config:
        allOf:
        - $ref: '#/definitions/models.ControlConfig'
        description: Control configuration (controls only)
      created:
        type: string
      data_mapping:
        allOf:
        - $ref: '#/definitions/models.ChartDataMapping'
        description: How to map data to chart (charts only)
      description:
        type: string
      display_config:
        allOf:
        - $ref: '#/definitions/models.DisplayConfig'
        description: Display configuration (displays only)
      id:
        description: UUID - same across versions
        type: string
      name:
        description: Unique identifier within namespace
        type: string
      namespace:
        description: Conflict-domain; uniqueness is (namespace, name). See models.Namespace.
        type: string
      options:
        additionalProperties: true
        description: ECharts options overrides (charts only)
        type: object
      query_config:
        allOf:
        - $ref: '#/definitions/models.ChartQueryConfig'
        description: How to query data (charts only)
      status:
        description: '"draft" | "final"'
        type: string
      tags:
        description: Searchable tags
        items:
          type: string
        type: array
      title:
        description: Display title (defaults to Name if empty)
        type: string
      updated:
        type: string
      use_custom_code:
        description: Whether custom code mode is enabled
        type: boolean
      uses_dashboard_variable:
        description: |-
          UsesDashboardVariable marks this component as accepting dashboard-variable
          VALUE SUBSTITUTION: its query/filter is authored with the `dashboard-variable`
          token, substituted at view time (filter_value mode — SQL WHERE or client-side
          filter; future). It does NOT gate connection_swap — swap is a per-panel
          concern (DashboardPanel.PinConnection): the connection itself is the
          variable, so any panel can be repointed without the component opting in.
        type: boolean
      version:
        description: Version number (1, 2, 3...)
        type: integer
    required:
    - name
    type: object
  models.ComponentListResponse:
    description: Response containing a list of components with pagination
    properties:
      components:
        items:
          $ref: '#/definitions/models.Component'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  models.ComponentSummary:
    description: Minimal component info for selection cards and lists
    properties:
      chart_type:
        type: string
      component_type:
        type: string
      connection_id:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      namespace:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      version:
        type: integer
    type: object
  models.ComponentVersionInfo:
    description: Version info for a component
    properties:
      has_draft:
        description: Whether a draft version exists
        type: boolean
      id:
        type: string
      status:
        type: string
      version:
        type: integer
      version_count:
        description: Total versions for this component id
        type: integer
    type: object
  models.ConfigItem:
    properties:
      category:
        description: Grouping category (e.g., "layout")
        type: string
      created:
        type: string
      description:
        description: Human-readable description
        type: string
      id:
        description: Unique key (e.g., "layout_dimensions")
        type: string
      key:
        description: Same as ID, for clarity
        type: string
      updated:
        type: string
      value:
        description: The setting value
    type: object
  models.Connection:
    properties:
      config:
        $ref: '#/definitions/models.ConnectionConfig'
      created_at:
        type: string
      description:
        type: string
      discovered_values:
        additionalProperties:
          $ref: '#/definitions/models.DiscoveredValueList'
        description: |-
          DiscoveredValues caches the distinct values of a column for the
          dashboard-variable dropdown, keyed by column name. Populated by an
          authoring-side capture (the editor's Fetch flow) for connection types
          that have no engine-side DISTINCT (streams/sockets) — the connection
          defines the API/topic and therefore the value domain, so the list lives
          here, not on the component or dashboard. Additive + nil-safe: absent on
          older records, no migration needed. A connection may filter on several
          columns over time, hence a map.
        type: object
      health:
        $ref: '#/definitions/models.HealthInfo'
      id:
        type: string
      name:
        type: string
      namespace:
        description: Conflict-domain; uniqueness is (namespace, name). See models.Namespace.
        type: string
      supported_schemas:
        description: Control schema support - which control schemas this connection
          supports
        items:
          type: string
        type: array
      tags:
        items:
          type: string
        type: array
      type:
        allOf:
        - $ref: '#/definitions/models.ConnectionType'
        description: 'LEGACY: Keep for backwards compatibility during migration'
      type_config:
        additionalProperties: true
        type: object
      type_id:
