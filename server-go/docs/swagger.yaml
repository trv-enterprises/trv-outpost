        as a UTF-8 string for the terminal page to render. Per-call `timeout_seconds`
        (clamped to [1, 300]) overrides the connection's default; on deadline expiry
        the handler returns 504 with a clarified message.
      parameters:
      - description: Command payload
        in: body
